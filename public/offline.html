<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#060c14" />
  <title>Weqayah - غير متصل</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #060c14;
      color: #e6f0fb;
      font-family: 'Tajawal', -apple-system, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 20px;
    }
    .icon {
      width: 96px;
      height: 96px;
      margin-bottom: 24px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(255, 48, 64, 0.15);
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 12px;
      color: #ff3040;
    }
    p {
      font-size: 15px;
      color: #8aa0b8;
      margin: 0 0 28px;
      max-width: 360px;
      line-height: 1.7;
    }
    button {
      background: #0a80ff;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #0070e0; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .status {
      margin-top: 24px;
      font-size: 13px;
      color: #5a7290;
    }
  </style>
</head>
<body>
  <img src="/icon-192.png" alt="Weqayah" class="icon" />
  <h1>لا يوجد اتصال بالإنترنت</h1>
  <p>تأكد من اتصالك بالإنترنت ثم حاول مرة أخرى. بعض المحتوى المخزن قد يكون متاحاً للعرض.</p>
  <button onclick="location.reload()">إعادة المحاولة</button>
  <div class="status" id="status">غير متصل</div>
  <script>
    window.addEventListener('online', () => location.reload());
    const status = document.getElementById('status');
    setInterval(() => {
      status.textContent = navigator.onLine ? 'متصل - جاري إعادة التحميل...' : 'غير متصل';
      if (navigator.onLine) setTimeout(() => location.reload(), 800);
    }, 2000);
  </script>
</body>
</html>
